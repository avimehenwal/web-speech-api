name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - asset/**
      - index.html
      - package.json
      - package-lock.json
      - vite.config.js
      - .github/workflows/gh-pages.yml

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.build_hash_cache.outputs.cache-hit != 'true' }}
    env:
      BUILD_HASH: ${{ hashFiles('src/**', 'asset/**', 'index.html', 'package.json', 'package-lock.json', 'vite.config.js') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Record build hash
        run: echo "${BUILD_HASH}" > .build-hash

      - name: Restore build hash cache
        id: build_hash_cache
        uses: actions/cache@v4
        with:
          path: .build-hash
          key: build-hash-${{ runner.os }}-${{ github.ref_name }}-${{ env.BUILD_HASH }}

      - name: Build
        if: steps.build_hash_cache.outputs.cache-hit != 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.build_hash_cache.outputs.cache-hit != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
